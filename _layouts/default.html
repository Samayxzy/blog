<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="dark light">
  {% seo %}
  <link rel="icon" href="{{ '/assets/images/favicon.svg' | relative_url }}" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <link rel="alternate" type="application/rss+xml" title="{{ site.title | escape }}" href="{{ '/feed.xml' | relative_url }}">
  <script>
    (function () {
      var t = localStorage.getItem('theme');
      if (t === 'light' || (!t && window.matchMedia('(prefers-color-scheme: light)').matches)) {
        document.documentElement.setAttribute('data-theme', 'light');
        document.documentElement.style.colorScheme = 'light';
      }
    })();
  </script>
</head>
<body>
  <div class="space-bg" aria-hidden="true"></div>

  {% if page.layout == 'post' %}
  <div class="reading-progress-track" aria-hidden="true">
    <div class="reading-progress-bar" id="reading-progress"></div>
  </div>
  {% endif %}

  <header class="navbar">
    <div class="nav-container">
      <a href="{{ '/' | relative_url }}" class="logo">
        <span class="logo-icon" aria-hidden="true">↑</span>{{ site.title }}
      </a>
      <button class="nav-toggle" id="nav-toggle" aria-label="Toggle navigation" aria-expanded="false" aria-controls="nav-links">
        <span class="nav-toggle-bar"></span>
        <span class="nav-toggle-bar"></span>
        <span class="nav-toggle-bar"></span>
      </button>
      <nav class="nav-links" id="nav-links">
        <a href="{{ '/' | relative_url }}">Home</a>
        <a href="{{ '/about/' | relative_url }}">About</a>
        {% if site.github_username %}
        <a href="https://github.com/{{ site.github_username }}" target="_blank" rel="noopener noreferrer">GitHub</a>
        {% endif %}
        <a href="{{ '/feed.xml' | relative_url }}" class="nav-rss" title="RSS feed">RSS</a>
        <button class="theme-toggle" id="theme-toggle" type="button" aria-label="Switch theme" title="Toggle theme">
          <span class="theme-icon" aria-hidden="true">☀️</span>
        </button>
      </nav>
    </div>
  </header>

  <main class="container{% if page.layout == 'home' %} container--feed{% endif %}">
    {{ content }}
  </main>

  <footer class="footer">
    <span class="footer-star" aria-hidden="true">✦</span> &copy; {{ site.time | date: "%Y" }} Samay Goyani
    <span class="footer-tagline">built among the stars</span>
    <nav class="footer-links" aria-label="Footer links">
      <a href="{{ '/feed.xml' | relative_url }}">RSS</a>
      <a href="{{ '/about/' | relative_url }}">About</a>
      {% if site.github_username %}
      <a href="https://github.com/{{ site.github_username }}" target="_blank" rel="noopener noreferrer">GitHub</a>
      {% endif %}
    </nav>
  </footer>

  <button class="back-to-top" id="back-to-top" type="button" aria-label="Back to top" title="Back to top">
    ↑
  </button>

  <script src="{{ '/assets/js/main.js' | relative_url }}" defer></script>
</body>
</html>
